<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام إدارة مغسلة السجاد</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
overflow:hidden;
}

header{
background:#2c3e50;
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:30px;
margin-bottom:5px;
}

.form-section{
padding:25px;
background:#f8f9fa;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:6px;
font-weight:bold;
}

input,select{
padding:12px;
border:2px solid #ddd;
border-radius:8px;
font-size:16px;
}

.counter{
display:flex;
gap:10px;
align-items:center;
}

.counter button{
width:40px;
height:40px;
border:none;
background:#667eea;
color:white;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.counter input{
width:70px;
text-align:center;
}

.submit-btn{
grid-column:span 2;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

.records-section{
padding:25px;
overflow-x:auto;
}

.search-box{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
text-align:center;
}

/* تحسين الموبايل */

@media (max-width:768px){

.form-section{
grid-template-columns:1fr;
}

.submit-btn{
grid-column:span 1;
}

}

</style>

</head>

<body>

<div class="container">

<header>
<h1>نظام إدارة مغسلة السجاد</h1>
<p>تسجيل العملاء وإدارة السجاد</p>
</header>

<div class="form-section">

<div class="form-group">
<label>اسم العميل</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>رقم الهاتف</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>رقم السجادة</label>
<input type="text" id="carpetNumber">
</div>

<div class="form-group">
<label>عدد السجاد</label>

<div class="counter">
<button onclick="changeCount(-1)">-</button>
<input type="number" id="carpets" value="1" readonly>
<button onclick="changeCount(1)">+</button>
</div>

</div>

<div class="form-group">
<label>نوع الخدمة</label>

<select id="type">
<option>غسيل عادي</option>
<option>غسيل مع تعقيم</option>
<option>غسيل سجاد عتيق</option>
</select>

</div>

<button class="submit-btn" onclick="addRecord()">إضافة الحجز</button>

</div>

<div class="records-section">

<h2 style="text-align:center">سجل العملاء</h2>

<div class="search-box">
<input type="text" id="search" placeholder="ابحث بالاسم أو الهاتف" onkeyup="searchName()">
</div>

<table>

<thead>

<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>رقم السجادة</th>
<th>عدد السجاد</th>
<th>الخدمة</th>
<th>التاريخ</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="recordsBody"></tbody>

</table>

<div class="total">
إجمالي السجاد:
<span id="totalCarpets">0</span>
</div>

</div>

</div>

<script>

let records=[]
let totalCarpets=0

function changeCount(v){

let input=document.getElementById("carpets")

let num=parseInt(input.value)+v

if(num>=1 && num<=100){
input.value=num
}

}

function addRecord(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let carpetNumber=document.getElementById("carpetNumber").value
let carpets=parseInt(document.getElementById("carpets").value)
let type=document.getElementById("type").value

if(name=="" || phone==""){
alert("يرجى إدخال البيانات")
return
}

let record={
name:name,
phone:phone,
carpetNumber:carpetNumber,
carpets:carpets,
type:type,
date:new Date().toLocaleDateString("ar-EG")
}

records.push(record)

totalCarpets+=carpets

updateTable()
saveData()

document.getElementById("name").value=""
document.getElementById("phone").value=""
document.getElementById("carpetNumber").value=""
document.getElementById("carpets").value=1

}

function updateTable(){

let tbody=document.getElementById("recordsBody")

tbody.innerHTML=""

records.forEach((r,index)=>{

let row=`
<tr>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>${r.carpetNumber}</td>
<td>${r.carpets}</td>
<td>${r.type}</td>
<td>${r.date}</td>

<td>
<button class="delete-btn" onclick="deleteRecord(${index})">
حذف
</button>
</td>

</tr>
`

tbody.innerHTML+=row

})

document.getElementById("totalCarpets").innerText=totalCarpets

}

function deleteRecord(i){

totalCarpets-=records[i].carpets

records.splice(i,1)

updateTable()
saveData()

}

function searchName(){

let value=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#recordsBody tr")

rows.forEach(r=>{

let name=r.children[0].innerText.toLowerCase()
let phone=r.children[1].innerText.toLowerCase()

if(name.includes(value) || phone.includes(value)){
r.style.display=""
}else{
r.style.display="none"
}

})

}

function saveData(){

localStorage.setItem("carpetRecords",JSON.stringify(records))

}

window.onload=function(){

let data=localStorage.getItem("carpetRecords")

if(data){

records=JSON.parse(data)

records.forEach(r=>{
totalCarpets+=r.carpets
})

updateTable()

}

}

</script>

</body>

</html>
